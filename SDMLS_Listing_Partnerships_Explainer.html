<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDMLS - What's Changing With Real Estate Listings?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;



const colors = {
  navy: "#0f2b46",
  blue: "#1a6fb5",
  lightBlue: "#e8f2fb",
  red: "#c0392b",
  orange: "#e67e22",
  green: "#27ae60",
  gray: "#64748b",
  lightGray: "#f1f5f9",
  white: "#ffffff",
  dark: "#1e293b",
};

const Arrow = ({ color = colors.blue }) => (
  <div style={{ display: "flex", justifyContent: "center", padding: "6px 0" }}>
    <svg width="24" height="28" viewBox="0 0 24 28">
      <path d="M12 0 L12 22 M4 16 L12 24 L20 16" stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  </div>
);

const FlowBox = ({ label, color, icon, sub, small }) => (
  <div style={{
    background: color || colors.lightBlue,
    borderRadius: 12,
    padding: small ? "10px 14px" : "14px 18px",
    textAlign: "center",
    border: `2px solid ${color === colors.white ? "#ddd" : "transparent"}`,
    boxShadow: "0 2px 8px rgba(0,0,0,0.06)",
  }}>
    {icon && <div style={{ fontSize: small ? 22 : 28, marginBottom: 4 }}>{icon}</div>}
    <div style={{ fontWeight: 700, fontSize: small ? 13 : 15, color: color === colors.red || color === colors.navy || color === colors.blue || color === colors.green ? colors.white : colors.dark, lineHeight: 1.3 }}>{label}</div>
    {sub && <div style={{ fontSize: 11, marginTop: 3, color: color === colors.red || color === colors.navy || color === colors.blue || color === colors.green ? "rgba(255,255,255,0.8)" : colors.gray, lineHeight: 1.3 }}>{sub}</div>}
  </div>
);

const StatCard = ({ number, label, color }) => (
  <div style={{ background: colors.white, borderRadius: 14, padding: "20px 16px", textAlign: "center", boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: `2px solid ${color}20`, flex: 1, minWidth: 140 }}>
    <div style={{ fontSize: 36, fontWeight: 800, color, lineHeight: 1 }}>{number}</div>
    <div style={{ fontSize: 13, color: colors.gray, marginTop: 8, lineHeight: 1.4 }}>{label}</div>
  </div>
);

const Tab = ({ active, label, onClick }) => (
  <button onClick={onClick} style={{
    padding: "10px 20px", border: "none", borderRadius: 8,
    background: active ? colors.navy : colors.lightGray,
    color: active ? colors.white : colors.dark,
    fontWeight: 600, fontSize: 14, cursor: "pointer",
    transition: "all 0.2s",
  }}>{label}</button>
);

const DealCard = ({ name, portal, color, exclusive, compliance, icon }) => (
  <div style={{ background: colors.white, borderRadius: 14, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: `3px solid ${color}`, flex: 1, minWidth: 220 }}>
    <div style={{ fontSize: 28, marginBottom: 6 }}>{icon}</div>
    <div style={{ fontWeight: 800, fontSize: 16, color: colors.dark, marginBottom: 4 }}>{name}</div>
    <div style={{ fontSize: 13, color, fontWeight: 700, marginBottom: 10 }}>{portal}</div>
    <div style={{ fontSize: 12, color: colors.gray, lineHeight: 1.6 }}>
      <div><strong>Exclusive?</strong> {exclusive}</div>
      <div><strong>MLS first?</strong> No — portal first</div>
      <div style={{ color: colors.red, fontWeight: 600, marginTop: 6 }}>{compliance}</div>
    </div>
  </div>
);

const App = function App() {
  const [tab, setTab] = useState("overview");

  return (
    <div style={{ fontFamily: "'Segoe UI', -apple-system, sans-serif", background: "#f8fafc", minHeight: "100vh", color: colors.dark }}>
      {/* Header */}
      <div style={{ background: `linear-gradient(135deg, ${colors.navy}, ${colors.blue})`, padding: "32px 24px 24px", color: colors.white, textAlign: "center" }}>
        <div style={{ fontSize: 13, textTransform: "uppercase", letterSpacing: 2, opacity: 0.7, marginBottom: 8 }}>SDMLS Member Briefing</div>
        <h1 style={{ fontSize: 26, fontWeight: 800, margin: 0, lineHeight: 1.2 }}>What's Changing With<br/>Real Estate Listings?</h1>
        <p style={{ fontSize: 14, opacity: 0.8, marginTop: 10, maxWidth: 500, marginLeft: "auto", marginRight: "auto", lineHeight: 1.5 }}>
          Major brokerages are partnering with portals to market listings <em>before</em> they hit the MLS. Here's what that means for you.
        </p>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, padding: "16px 16px 0", flexWrap: "wrap", justifyContent: "center" }}>
        <Tab active={tab === "overview"} label="The Big Picture" onClick={() => setTab("overview")} />
        <Tab active={tab === "deals"} label="The Deals" onClick={() => setTab("deals")} />
        <Tab active={tab === "rules"} label="Our Rules" onClick={() => setTab("rules")} />
        <Tab active={tab === "impact"} label="Who's Affected" onClick={() => setTab("impact")} />
        <Tab active={tab === "whatif"} label="What If We Adapt?" onClick={() => setTab("whatif")} />
      </div>

      <div style={{ padding: 16, maxWidth: 720, margin: "0 auto" }}>

        {/* TAB: OVERVIEW */}
        {tab === "overview" && (
          <div>
            <div style={{ background: colors.white, borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 18, margin: "0 0 6px", color: colors.navy }}>How Listings Used to Work</h2>
              <p style={{ fontSize: 13, color: colors.gray, margin: "0 0 16px" }}>Every listing went through the same path — the MLS was the central hub.</p>
              <div style={{ maxWidth: 280, margin: "0 auto" }}>
                <FlowBox label="Agent Gets Listing" icon="🏠" color={colors.lightBlue} />
                <Arrow />
                <FlowBox label="Enters MLS" icon="📋" color={colors.blue} sub="Within 1 business day" />
                <Arrow />
                <FlowBox label="ALL Agents See It" icon="👥" color={colors.green} sub="Every brokerage, every agent" />
                <Arrow />
                <FlowBox label="Goes to Portals" icon="🌐" color={colors.lightGray} sub="Zillow, Redfin, Realtor.com — everyone gets same listing at same time" />
              </div>
              <div style={{ background: "#e8f8ef", borderRadius: 10, padding: 12, marginTop: 16, textAlign: "center" }}>
                <span style={{ fontSize: 13, color: colors.green, fontWeight: 600 }}>✅ Level playing field — every agent had equal access to every listing</span>
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <h2 style={{ fontSize: 18, margin: "0 0 6px", color: colors.red }}>How It's Changing Now</h2>
              <p style={{ fontSize: 13, color: colors.gray, margin: "0 0 16px" }}>Big brokerages are sending listings to their portal partner <strong>first</strong> — before the MLS.</p>
              <div style={{ maxWidth: 340, margin: "0 auto" }}>
                <FlowBox label="Agent Gets Listing" icon="🏠" color={colors.lightBlue} />
                <Arrow color={colors.red} />
                <FlowBox label="Goes to Partner Portal FIRST" icon="⚡" color={colors.red} sub="Redfin, Zillow, or Realtor.com — before any MLS entry" />
                <Arrow color={colors.red} />
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <FlowBox small label="Partner agents get leads & early access" icon="🔒" color={colors.orange} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <FlowBox small label="Everyone else waits" icon="⏳" color={colors.lightGray} />
                  </div>
                </div>
                <Arrow />
                <FlowBox label="Maybe enters MLS later" icon="📋" color={colors.lightGray} sub="If it doesn't sell first" />
              </div>
              <div style={{ background: "#fdf0f0", borderRadius: 10, padding: 12, marginTop: 16, textAlign: "center" }}>
                <span style={{ fontSize: 13, color: colors.red, fontWeight: 600 }}>❌ Unlevel playing field — big brokerages get a head start, smaller agents are left behind</span>
              </div>
            </div>
          </div>
        )}

        {/* TAB: DEALS */}
        {tab === "deals" && (
          <div>
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 4px", color: colors.navy }}>Three Deals in Three Weeks</h2>
              <p style={{ fontSize: 13, color: colors.gray, margin: "0 0 16px" }}>Between Feb 26 and Mar 18, 2026, the industry shifted dramatically.</p>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <DealCard
                  name="Compass + Redfin + Rocket"
                  portal="Listings appear on Redfin"
                  color={colors.red}
                  icon="🔴"
                  exclusive="Yes — only Redfin"
                  compliance="Conflicts with SDMLS rules"
                />
                <DealCard
                  name="Zillow Preview"
                  portal="KW, RE/MAX, BHHS, Side, United RE → Zillow"
                  color={colors.blue}
                  icon="🔵"
                  exclusive="Appears to be"
                  compliance="Conflicts with SDMLS rules"
                />
                <DealCard
                  name="eXp + Realtor.com"
                  portal="Also Homes.com + ComeHome.com"
                  color={colors.orange}
                  icon="🟠"
                  exclusive="No — open to any portal"
                  compliance="Conflicts with SDMLS rules"
                />
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>What's Different About Each Deal?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8, color: colors.dark }}>
                <div style={{ padding: "12px 14px", background: "#fef2f2", borderRadius: 10, marginBottom: 8 }}>
                  <strong style={{ color: colors.red }}>🔴 Compass / Redfin / Rocket</strong><br/>
                  Most aggressive. Compass listings go exclusively to Redfin before the MLS. Leads only go to Compass agents. Rocket Mortgage is bundled in (buyers get rate discounts). Days on market and price drops are hidden. Compass CEO has publicly said the MLS should no longer be mandatory.
                </div>
                <div style={{ padding: "12px 14px", background: "#eff6ff", borderRadius: 10, marginBottom: 8 }}>
                  <strong style={{ color: colors.blue }}>🔵 Zillow Preview</strong><br/>
                  Listings from KW, RE/MAX, Berkshire Hathaway, Side, and United RE appear on Zillow and Trulia before the MLS. Zillow says agents must follow local MLS rules — but Zillow doesn't enforce that. Listing agents get a 10% bonus commission if the deal closes through a Zillow buyer agent.
                </div>
                <div style={{ padding: "12px 14px", background: "#fff7ed", borderRadius: 10 }}>
                  <strong style={{ color: colors.orange }}>🟠 eXp / Realtor.com / Homes.com</strong><br/>
                  Most open approach. eXp sends Coming Soon listings to three portals at once — and says any portal can get them on equal terms. Still requires local MLS compliance. Goes live April 15, 2026.
                </div>
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <h2 style={{ fontSize: 17, margin: "0 0 4px", color: colors.navy }}>Why Are They Doing This?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.7, color: colors.dark }}>
                <p style={{ margin: "8px 0" }}>🎯 <strong>Control inventory</strong> — if your brokerage has listings no one else can see, you attract more agents to join you</p>
                <p style={{ margin: "8px 0" }}>💰 <strong>Control leads</strong> — buyer inquiries go to the listing agent or the partner brokerage, not to random agents who paid for Zillow ads</p>
                <p style={{ margin: "8px 0" }}>🏦 <strong>Bundle mortgage</strong> — Rocket Mortgage is embedded in the Compass deal, creating a closed ecosystem from search to close</p>
                <p style={{ margin: "8px 0" }}>📊 <strong>Recruiting tool</strong> — "Join our brokerage and your listings get Zillow/Redfin exposure before anyone else's"</p>
              </div>
            </div>
          </div>
        )}

        {/* TAB: RULES */}
        {tab === "rules" && (
          <div>
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>What Do SDMLS Rules Say?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                <div style={{ background: colors.lightBlue, borderRadius: 10, padding: 14, marginBottom: 10 }}>
                  <strong style={{ color: colors.navy }}>📋 Rule 7.5 — If you market it publicly, it goes in the MLS</strong><br/>
                  Within <strong>1 business day</strong> of any public marketing — including on any website, social media, email blasts, or flyers — the listing <strong>must</strong> be submitted to the MLS. Putting a listing on Redfin, Zillow, or Realtor.com is public marketing.
                </div>
                <div style={{ background: "#f0fdf4", borderRadius: 10, padding: 14, marginBottom: 10 }}>
                  <strong style={{ color: colors.green }}>🔒 Rule 7.6 — Office Exclusive = NO public marketing at all</strong><br/>
                  A listing can stay off the MLS only if the seller signs a form saying it won't be publicly marketed. Only private, one-on-one conversations between brokers are allowed. The moment it appears on any website, it must go into the MLS.
                </div>
                <div style={{ background: "#fefce8", borderRadius: 10, padding: 14, marginBottom: 10 }}>
                  <strong style={{ color: colors.orange }}>⏳ Rule 10.1 — Coming Soon = In the MLS, but limited</strong><br/>
                  Coming Soon is an MLS status. The listing is in our system. But it has restrictions: <strong>no open houses</strong>, only broker-to-broker 1:1 viewings, and it <strong>cannot appear on IDX websites or public third-party sites</strong> like Zillow or Redfin.
                </div>
                <div style={{ background: "#f5f0ff", borderRadius: 10, padding: 14 }}>
                  <strong style={{ color: "#7c3aed" }}>👤 But — Coming Soon IS available through VOW feeds</strong><br/>
                  SDMLS does share Coming Soon listings with brokers through <strong>VOW (Virtual Office Website) feeds</strong>. Any broker with VOW can show Coming Soon listings to <strong>registered consumers</strong> — people who have signed up with a name, email, and password. This is a controlled channel, not wide-open public access like Zillow or Redfin.
                </div>
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>So What's the Problem?</h2>
              <div style={{ maxWidth: 500, margin: "0 auto" }}>
                <div style={{ display: "flex", gap: 12, alignItems: "stretch" }}>
                  <div style={{ flex: 1, background: "#fef2f2", borderRadius: 12, padding: 14, textAlign: "center" }}>
                    <div style={{ fontSize: 28 }}>🌐</div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: colors.red }}>What the portals do</div>
                    <div style={{ fontSize: 12, color: colors.gray, marginTop: 6 }}>Show listings to <strong>everyone</strong> on the internet with <strong>no registration</strong> — before the MLS even knows about them</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", fontWeight: 800, color: colors.gray, fontSize: 20 }}>vs.</div>
                  <div style={{ flex: 1, background: "#f0fdf4", borderRadius: 12, padding: 14, textAlign: "center" }}>
                    <div style={{ fontSize: 28 }}>📋</div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: colors.green }}>What our rules allow</div>
                    <div style={{ fontSize: 12, color: colors.gray, marginTop: 6 }}>Coming Soon listings shared with <strong>registered consumers</strong> through VOW — a controlled, broker-mediated channel</div>
                  </div>
                </div>
                <div style={{ marginTop: 14, background: "#fefce8", borderRadius: 10, padding: 12, textAlign: "center" }}>
                  <span style={{ fontSize: 13, color: colors.dark, fontWeight: 600 }}>The gap: these portals are doing what VOW does — but without the registration requirement, making it fully public and bypassing our rules.</span>
                </div>
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <h2 style={{ fontSize: 17, margin: "0 0 8px", color: colors.navy }}>The Bottom Line</h2>
              <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                <p>None of these portal partnerships are structured to comply with SDMLS rules. They all involve publicly marketing listings before MLS entry — which triggers our mandatory submission rule.</p>
                <p>Even if a listing is entered into SDMLS as Coming Soon, our rules don't allow it to appear on Zillow, Redfin, or Realtor.com as a public listing. Those portals could use a VOW-compliant approach with consumer registration — but they've chosen not to.</p>
              </div>
            </div>
          </div>
        )}

        {/* TAB: IMPACT */}
        {tab === "impact" && (
          <div>
            <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
              <StatCard number="95.5%" label="of SDMLS firms have 10 or fewer agents" color={colors.red} />
              <StatCard number="2,570" label="small firms that could lose access to early inventory" color={colors.orange} />
              <StatCard number="33.8%" label="of our agents are at partnership brokerages" color={colors.blue} />
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>Who Has a Portal Deal in San Diego?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.5 }}>
                {[
                  { group: "Compass + Anywhere brands → Redfin", agents: "1,544", brands: "Compass, Coldwell Banker, Century 21, Pacific Sotheby's, Redfin", color: colors.red },
                  { group: "Zillow Preview partners", agents: "860", brands: "Keller Williams, RE/MAX, Berkshire Hathaway HomeServices", color: colors.blue },
                  { group: "eXp → Realtor.com / Homes.com", agents: "781", brands: "eXp Realty", color: colors.orange },
                ].map((d, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: i < 2 ? "1px solid #f1f5f9" : "none" }}>
                    <div style={{ width: 48, height: 48, borderRadius: 12, background: d.color, display: "flex", alignItems: "center", justifyContent: "center", color: colors.white, fontWeight: 800, fontSize: 16, flexShrink: 0 }}>{d.agents}</div>
                    <div>
                      <div style={{ fontWeight: 700, color: colors.dark }}>{d.group}</div>
                      <div style={{ fontSize: 12, color: colors.gray }}>{d.brands}</div>
                    </div>
                  </div>
                ))}
                <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 0 4px", borderTop: `2px solid ${colors.dark}`, marginTop: 6 }}>
                  <div style={{ width: 48, height: 48, borderRadius: 12, background: colors.dark, display: "flex", alignItems: "center", justifyContent: "center", color: colors.white, fontWeight: 800, fontSize: 13, flexShrink: 0 }}>3,185</div>
                  <div>
                    <div style={{ fontWeight: 700, color: colors.dark }}>Total partnership-affiliated agents in SDMLS</div>
                    <div style={{ fontSize: 12, color: colors.gray }}>Out of 9,431 total agents (33.8%)</div>
                  </div>
                </div>
              </div>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>What Does This Mean for Smaller Brokerages?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8 }}>
                <p style={{ margin: "6px 0" }}>🏢 <strong>2,570 firms</strong> (95.5%) have 10 or fewer agents — including 1,759 solo practitioners</p>
                <p style={{ margin: "6px 0" }}>🚫 These firms have <strong>no portal partnership</strong> and <strong>no access</strong> to pre-market listings</p>
                <p style={{ margin: "6px 0" }}>⏰ They won't see these listings until they hit the MLS — which may be days or weeks later, if at all</p>
                <p style={{ margin: "6px 0" }}>🤝 Their buyer clients may miss out on properties that sell before reaching the open market</p>
                <p style={{ margin: "6px 0" }}>📉 This creates a <strong>two-tier system</strong>: agents at big brokerages get early access; everyone else waits</p>
              </div>
            </div>

            <div style={{ background: `linear-gradient(135deg, ${colors.navy}, ${colors.blue})`, borderRadius: 16, padding: 20, color: colors.white }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px" }}>What Happens Next?</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8, opacity: 0.95 }}>
                <p style={{ margin: "6px 0" }}>📌 SDMLS is actively analyzing these deals and how they interact with our rules</p>
                <p style={{ margin: "6px 0" }}>👥 A broker working group may be formed to advise on the MLS policy response</p>
                <p style={{ margin: "6px 0" }}>🗓️ Industry town hall on March 31 to discuss these changes across MLSs nationwide</p>
              </div>
            </div>
          </div>
        )}

        {/* TAB: WHAT IF */}
        {tab === "whatif" && (
          <div>
            <div style={{ background: colors.white, borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <div style={{ display: "inline-block", background: "#dbeafe", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, color: colors.blue, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Policy Scenario</div>
              <h2 style={{ fontSize: 18, margin: "0 0 6px", color: colors.navy }}>What If SDMLS Opens Coming Soon to IDX & Syndication?</h2>
              <p style={{ fontSize: 13, color: colors.gray, margin: 0, lineHeight: 1.5 }}>
                Right now, Coming Soon listings can only be shared through VOW feeds (which require consumer registration). What would change if SDMLS allowed Coming Soon listings to appear on IDX websites, syndication feeds, and public third-party portals like Zillow, Redfin, and Realtor.com?
              </p>
            </div>

            {/* NEW FLOW */}
            <div style={{ background: colors.white, borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 14px", color: colors.green }}>The New Listing Flow</h2>
              <div style={{ maxWidth: 340, margin: "0 auto" }}>
                <FlowBox label="Agent Gets Listing" icon="🏠" color={colors.lightBlue} />
                <Arrow color={colors.green} />
                <FlowBox label="Enters SDMLS as Coming Soon" icon="📋" color={colors.green} sub="MLS is the system of record from Day 1" />
                <Arrow color={colors.green} />
                <FlowBox label="Distributed Everywhere" icon="🌐" color={colors.blue} sub="IDX sites, Zillow, Redfin, Realtor.com, broker websites — through MLS feeds" />
                <Arrow color={colors.green} />
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <FlowBox small label="ALL agents see it" icon="👥" color={colors.green} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <FlowBox small label="ALL buyers see it" icon="🔍" color={colors.green} />
                  </div>
                </div>
                <Arrow color={colors.green} />
                <FlowBox label="Goes Active when ready for showings" icon="🔑" color={colors.navy} sub="Coming Soon restrictions still apply until then (1:1 viewings only, no open houses)" />
              </div>
            </div>

            {/* WHAT CHANGES */}
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.navy }}>What Changes</h2>
              <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                  <div style={{ flex: 1, background: "#fef2f2", borderRadius: 10, padding: 14 }}>
                    <div style={{ fontWeight: 700, color: colors.red, marginBottom: 6 }}>Today's Rules</div>
                    <p style={{ margin: "4px 0" }}>❌ Coming Soon blocked from IDX</p>
                    <p style={{ margin: "4px 0" }}>❌ Coming Soon blocked from syndication</p>
                    <p style={{ margin: "4px 0" }}>❌ Not on Zillow, Redfin, Realtor.com</p>
                    <p style={{ margin: "4px 0" }}>✅ Only on VOW (registration required)</p>
                    <p style={{ margin: "4px 0" }}>✅ Broker can market directly (signs, social)</p>
                  </div>
                  <div style={{ flex: 1, background: "#f0fdf4", borderRadius: 10, padding: 14 }}>
                    <div style={{ fontWeight: 700, color: colors.green, marginBottom: 6 }}>Proposed Change</div>
                    <p style={{ margin: "4px 0" }}>✅ Coming Soon on IDX</p>
                    <p style={{ margin: "4px 0" }}>✅ Coming Soon in syndication feeds</p>
                    <p style={{ margin: "4px 0" }}>✅ Appears on Zillow, Redfin, Realtor.com</p>
                    <p style={{ margin: "4px 0" }}>✅ Still on VOW</p>
                    <p style={{ margin: "4px 0" }}>✅ Broker can still market directly</p>
                  </div>
                </div>
                <div style={{ background: "#fefce8", borderRadius: 10, padding: 12, marginBottom: 8 }}>
                  <span style={{ fontWeight: 700, color: colors.dark }}>What stays the same:</span>
                  <span style={{ color: colors.gray }}> No open houses during Coming Soon. Only broker-to-broker 1:1 viewings. Listing must enter MLS before public marketing. One-time use only.</span>
                </div>
              </div>
            </div>

            {/* BENEFITS */}
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.green }}>✅ What This Solves</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8 }}>
                <p style={{ margin: "6px 0" }}>📋 <strong>MLS stays the system of record</strong> — listings enter SDMLS first, not Zillow or Redfin. The MLS controls the data.</p>
                <p style={{ margin: "6px 0" }}>👥 <strong>Every agent sees every listing</strong> — no more two-tier system. Small brokerages see Coming Soon inventory on IDX just like the big firms.</p>
                <p style={{ margin: "6px 0" }}>🔍 <strong>Every buyer sees every listing</strong> — consumers searching on any portal or broker website see the same Coming Soon inventory. No fragmentation.</p>
                <p style={{ margin: "6px 0" }}>⚖️ <strong>Levels the playing field</strong> — removes the competitive advantage of portal partnerships. Why does a KW agent need Zillow Preview if Coming Soon listings are already on Zillow through MLS syndication?</p>
                <p style={{ margin: "6px 0" }}>📊 <strong>SDMLS captures the data</strong> — listing activity, views, and history stay in MLS records instead of living in Zillow's or Redfin's walled gardens.</p>
                <p style={{ margin: "6px 0" }}>🤝 <strong>Reduces incentive to bypass MLS</strong> — if agents can get pre-market exposure through the MLS, the appeal of going portal-first diminishes.</p>
              </div>
            </div>

            {/* RISKS */}
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 12px", color: colors.orange }}>⚠️ Risks & Tradeoffs</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8 }}>
                <p style={{ margin: "6px 0" }}>🏃 <strong>Accelerates the pre-market trend</strong> — more listings may start as Coming Soon rather than going straight to Active, which could normalize a slower path to full market exposure.</p>
                <p style={{ margin: "6px 0" }}>🚪 <strong>Doesn't address Office Exclusives</strong> — brokerages can still use Office Exclusive (§7.6) to keep listings completely private. This change only helps when listings enter the MLS.</p>
                <p style={{ margin: "6px 0" }}>🔒 <strong>Showing restrictions remain</strong> — Coming Soon only allows broker-to-broker 1:1 viewings. Buyers see listings on Zillow but can't do open houses or casual showings until Active.</p>
                <p style={{ margin: "6px 0" }}>🤔 <strong>Portal partners may still want more</strong> — Compass wants to suppress days on market and price drops. Zillow wants to control the lead flow. Simply syndicating through MLS doesn't give them those features.</p>
                <p style={{ margin: "6px 0" }}>📐 <strong>Other MLSs may not follow</strong> — if SDMLS acts alone, it affects only our market. Broader impact requires coordination with CRMLS and other California MLSs.</p>
              </div>
            </div>

            {/* SIDE BY SIDE COMPARISON */}
            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, margin: "0 0 14px", color: colors.navy }}>How It Compares to the Portal Deals</h2>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: colors.navy, color: colors.white }}>
                      <th style={{ padding: "10px 8px", textAlign: "left", borderRadius: "8px 0 0 0" }}></th>
                      <th style={{ padding: "10px 8px", textAlign: "center" }}>SDMLS Coming Soon (Proposed)</th>
                      <th style={{ padding: "10px 8px", textAlign: "center" }}>Compass → Redfin</th>
                      <th style={{ padding: "10px 8px", textAlign: "center" }}>Zillow Preview</th>
                      <th style={{ padding: "10px 8px", textAlign: "center", borderRadius: "0 8px 0 0" }}>eXp → Realtor.com</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["In MLS?", "✅ Yes — MLS first", "❌ No — portal first", "❌ No — portal first", "❌ No — portal first"],
                      ["All agents see it?", "✅ Yes — via IDX", "❌ Compass agents only", "⚠️ On Zillow, but not in MLS", "⚠️ On portals, but not in MLS"],
                      ["All portals get it?", "✅ Yes — via syndication", "❌ Redfin only", "❌ Zillow/Trulia only", "✅ 3 portals (non-exclusive)"],
                      ["MLS has the data?", "✅ Yes", "❌ No — data lives at Redfin", "❌ No — data lives at Zillow", "❌ No — data lives at portals"],
                      ["Small brokers included?", "✅ Equal access", "❌ Excluded", "❌ Excluded", "❌ Excluded"],
                      ["Leads go to listing agent?", "✅ Via broker's own site/IDX", "⚠️ Compass agents only", "⚠️ Listing agent + Zillow bonus", "⚠️ Standard portal routing"],
                      ["DOM/Price drops visible?", "✅ Standard MLS data", "❌ Hidden on Redfin", "⚠️ Agent can hide", "✅ Not suppressed"],
                    ].map((row, i) => (
                      <tr key={i} style={{ background: i % 2 === 0 ? colors.lightGray : colors.white }}>
                        {row.map((cell, j) => (
                          <td key={j} style={{ padding: "8px", textAlign: j === 0 ? "left" : "center", fontWeight: j === 0 ? 700 : 400, borderBottom: "1px solid #e2e8f0" }}>{cell}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* THE KEY ARGUMENT */}
            <div style={{ background: `linear-gradient(135deg, ${colors.green}, #1a8a4a)`, borderRadius: 16, padding: 24, color: colors.white, marginBottom: 16 }}>
              <h2 style={{ fontSize: 18, margin: "0 0 10px" }}>The Key Argument</h2>
              <p style={{ fontSize: 15, lineHeight: 1.7, margin: 0, opacity: 0.95 }}>
                If Coming Soon listings flow through the MLS to <em>every</em> portal, <em>every</em> IDX site, and <em>every</em> broker — there's no competitive advantage in a private portal deal. The MLS becomes the pre-market hub, not Zillow or Redfin.
              </p>
            </div>

            <div style={{ background: colors.white, borderRadius: 16, padding: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <h2 style={{ fontSize: 17, margin: "0 0 8px", color: colors.navy }}>Questions for the Working Group</h2>
              <div style={{ fontSize: 13, lineHeight: 1.8 }}>
                <p style={{ margin: "6px 0" }}>1️⃣ Does opening Coming Soon to IDX/syndication give agents enough pre-market value to keep listings in the MLS?</p>
                <p style={{ margin: "6px 0" }}>2️⃣ Should Coming Soon showing restrictions change too — or should 1:1 broker viewings remain the rule?</p>
                <p style={{ margin: "6px 0" }}>3️⃣ Should there be a time limit on Coming Soon (e.g., max 14 or 21 days before going Active)?</p>
                <p style={{ margin: "6px 0" }}>4️⃣ How do we handle Office Exclusives that stay completely off-market? Is that a separate problem?</p>
                <p style={{ margin: "6px 0" }}>5️⃣ Should SDMLS coordinate this change with CRMLS and other California MLSs for maximum impact?</p>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{ textAlign: "center", padding: "20px 16px 32px", fontSize: 11, color: colors.gray }}>
        SDMLS Internal Briefing • March 2026 • For SDMLS Members & Board
      </div>
    </div>
  );
}

root.render(React.createElement(App));
